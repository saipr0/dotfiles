# Base
set -g base-index 1
set -g pane-base-index 1
set-option -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"

# QoL
set -g mouse on
set -g set-clipboard on
set -sg escape-time 0
set -g repeat-time 1000
set -g history-limit 50000
bind r source-file ~/.tmux.conf

# Visual
set -g terminal-features "xterm-256color:RGB,tmux-256color:RGB,screen-256color:RGB"
set -ag terminal-overrides ',*:cud1=\E[1B'
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour245
set -g status-style bg=default,fg=default
set -g window-status-style default
set -g window-status-current-style default
set -g window-status-current-format " #I:#W#F "
bind b set-option status

# Keybindings
bind k send-keys -R \; clear-history

# Keybindings: lazygit
# Run through a login shell so mise Ruby/Bundler is available inside the popup.
bind -n C-g display-popup -E -w 90% -h 90% -T 'Lazygit' -d '#{pane_current_path}' '/bin/zsh -lic "lazygit"'

# Vi-style copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse copy mode
bind -T copy-mode-vi DoubleClick1Pane send-keys -X select-word
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Required for image.nvim to clear images properly in tmux
set -gq allow-passthrough on

if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"
